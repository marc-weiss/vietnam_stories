<div align=right><b>Christopher Guerin</b></div><br>
<font size="+1">
Who are these people at 11 P.M?<BR>
I lose count at thirty, when I'm pushed<BR>
By a skinny youth, drunk, high perhaps,<BR>
Stumbling up to the wall:  "You taught me to smoke,"<BR>
He says, forehead pressing  etched granite,<BR>
"I'm trying to quit, Dad.  You'd want me to by <A HREF = "thewall8.html">now</A>."<BR>


</font>
