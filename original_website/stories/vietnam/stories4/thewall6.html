<font size="+1">
I'm surprised to find a humane memorial<BR>
In spite of all that's been said.<BR>
Each name has a <A HREF = "thewall7.html">voice we can touch,</A><BR>
Trace with fingers, pronounce in the solemn<BR>

Are not reduced to three anonymous soldiers<BR>
No one ever mentioned in a prayer.<BR>
